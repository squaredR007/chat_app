<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>account&privacy</title>
</head>
<body>

<div class="settings-container">
    <a href="../pages/settings.html" class="back-btn"><span class="back-icon">←</span></a>

    <div class="profile-detail-container">
        <div class="info-card">

            <div class="info-row">
                <span class="label">username</span>
                <span id="text-username" class="value-text"></span>
                <input type="text" id="input-username" class="value-input" value="username">
            </div>


            <div class="info-row">
                <span class="label">number</span>
                <span id="text-number" class="value-text"></span>
                <input type="text" id="input-number" class="value-input" value="number">
            </div>


            <div class="info-row">
                <span class="label">password</span>
                <span id="text-password" class="value-text"></span>
                <input type="password" id="input-password" class="value-input" value="password">
            </div>
        </div>


        <button id="main-btn" class="edit-btn" onclick="toggleEdit()">edit</button>

        <div class="delete-section">
            <button class="delete-btn" onclick="confirmDelete()">delete account</button>
        </div>
    </div>
</div>
<link rel="stylesheet" href="../css/account&privacy.css">
<script src="../js/account&privacy.js"></script>
</body>
</html>
