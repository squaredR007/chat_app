<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Chat Settings</title>
</head>

<body>

<div class="settings-container">

    <a href="../pages/settings.html" class="back-btn">
        <span class="back-icon">←</span>
    </a>


    <div class="profile-detail-container">

        <div class="info-card">


            <div class="info-row">

                <span class="label">dark mode</span>

                <input type="checkbox" id="checkbox-dark-mode">

            </div>



            <div class="background-title">
                Chat Background
            </div>



            <div class="background-options">


                <div class="background-option" data-background="heart"></div>

                <div class="background-option" data-background="bow-tie"></div>

                <div class="background-option" data-background="flower"></div>


            </div>


        </div>

    </div>


</div>



<link rel="stylesheet" href="../css/chatSettings.css">

<script src="../js/chatSettings.js"></script>


</body>
</html>
