<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>login</title>
</head>
<body>

<form class="main-form">
    <!-- username -->
    <div>
        <label for="username" class="box-title">username</label>
        <input id="username" type="text" class="input-box" placeholder="Please enter your username">
    </div>

    <!-- password -->
    <div>
        <label for="password" class="box-title">Password</label>
        <input id="password" type="password" class="input-box" placeholder="Please enter your password">
    </div>

    <!-- submit -->
    <button type="submit" class="submit-btn">login</button>
    <!-- sign up link -->
    <div class="bottom-text">don't have an account?</div>
    <a href="../pages/signup.html">create an account!</a>

</form>
<!-- style -->
<link rel="stylesheet" href="../css/login.css">
<!-- script -->
<script src="../js/login.js"></script>
</body>
</html>
