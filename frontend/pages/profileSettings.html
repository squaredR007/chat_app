<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>profile Settings</title>
</head>
<body>

<div class="settings-container">
    <a href="../pages/settings.html" class="back-btn"><span class="back-icon">←</span></a>

    <div class="profile-detail-container">
        <div class="info-card">

            <div class="info-row">
                <span class="label">profile image</span>
                <img id="preview-profile-image" class="avatar-preview" src="" alt="">
                <span id="text-profile-image" class="value-text"></span>
                <input type="file" id="input-profile-image" class="value-input" accept="image/*">
            </div>

            <div class="info-row">
                <span class="label">display name</span>
                <span id="text-displayname" class="value-text"></span>
                <input type="text" id="input-displayname" class="value-input" value="display name">
            </div>

            <div class="info-row">
                <span class="label">biography</span>
                <span id="text-biography" class="value-text"></span>
                <input type="text" id="input-biography" class="value-input" value="biography">
            </div>

        </div>

        <button id="main-btn" class="edit-btn" onclick="toggleEdit()">edit</button>
    </div>
</div>
<link rel="stylesheet" href="../css/profileSettings.css">
<script src="../js/theme.js"></script>
<script src="../js/profileSettings.js"></script>
</body>
</html>
