<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>sign up</title>
</head>
<body>

<form class="main-form">

  <h4 class="box-title" >username</h4>
  <input type="text" class="input-box" placeholder="please enter the username">

  <h4 class="box-title" >password</h4>
  <input type="password" class="input-box" placeholder="please enter the password">

  <h4 class="box-title" >Repeat password</h4>
  <input type="password" class="input-box" placeholder="Please repeat the password.">

  <h4 class="box-title" >number</h4>
  <input type="tel" name="phoneNumber" class="number" placeholder="Please enter the number.">

  <button type="submit" class="submit-btn">sign up</button>

  <div class="bottom-text">Have you already created an account?</div>
  <div class="bottom-text">login</div>

</form>

</body>
</html>
