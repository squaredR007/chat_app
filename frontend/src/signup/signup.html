<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>sign up</title>
</head>
<body>

<form class="main-form">

  <div>
    <label for="username" class="box-title">username</label>
    <input id="username" type="text" class="input-box" placeholder="Please enter your username">
  </div>

  <div>
    <label for="password" class="box-title">Password</label>
    <input id="password" type="password" class="input-box" placeholder="Please enter your password">
  </div>

  <div>
    <label for="repeatPassword" class="box-title">Password</label>
    <input id="repeatPassword" type="password" class="input-box" placeholder="Please repeat the password">
  </div>


  <div>
    <label for="number" class="box-title">number</label>
    <input id="number" type="tel" class="input-box" placeholder="Please enter your number">
  </div>

  <button type="submit" class="submit-btn">sign up</button>

  <div class="bottom-text">Have you already created an account?</div>
  <a href="../login/login.html">login</a>

</form>
<link rel="stylesheet" href="signup.css">
</body>
</html>
